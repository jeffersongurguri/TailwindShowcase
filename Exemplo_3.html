<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showcase Tailwind</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
  <div class="text-center mb-8">
    <h2 class="text-2xl font-bold text-gray-900">Acesso ao Sistema</h2>
    <p class="text-gray-500 text-sm mt-2">Insira suas credenciais para continuar</p>
  </div>

  <form class="space-y-5">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail Institucional</label>
      <input type="email" id="email" 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all placeholder-gray-400" 
        placeholder="nome@instituicao.edu.br">
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
      <input type="password" id="password" 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all placeholder-gray-400" 
        placeholder="••••••••">
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center">
        <input id="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
        <label for="remember-me" class="ml-2 block text-sm text-gray-700 cursor-pointer">
          Lembrar-me
        </label>
      </div>
      <a href="#" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
        Esqueceu a senha?
      </a>
    </div>

    <button type="button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
      Entrar
    </button>
  </form>
</div>
  </body>
</html>
